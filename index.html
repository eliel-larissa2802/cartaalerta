<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Convite Eliel & Larissa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="video-background-container">
        <video autoplay loop muted playsinline class="video-background">
            <source src="fundo.mp4" type="video/mp4">
            Seu navegador não suporta vídeos HTML5.
        </video>
        <div class="video-overlay"></div>
    </div>

    <div class="main-content-container">
        <div class="invitation-container" id="invitationContainer">
            <div class="card-wrapper">
                
                <div class="card-external">
                    <div class="envelope-top" id="envelopeTop"></div>
                    <div class="envelope-bottom">
                        <span class="hint-text">TOQUE PARA ABRIR</span>
                    </div>
                    
                    <img src="logo.png" alt="Selo Eliel & Larissa" class="golden-seal" id="goldenSeal">
                </div>

                <div class="paper" id="paperContent">
                    <a href="https://elielelarissaconvite.my.canva.site/eliel-larissa-site" class="btn-close-x" id="btnCloseX" target="_top">&times;</a>
                    
                    <div class="paper-inner">
                        <h2 class="paper-title">Confirme sua presença</h2>
                        <p class="paper-subtitle">Esperamos por você! 💚</p>
                        
                        <p class="paper-text">
                            Sua presença é essencial para nós!<br>
                            Por favor, confirme até o dia <strong>30 de abril</strong>.<br>
                            <small>Se não houver confirmação, entenderemos que não poderá comparecer.</small>
                        </p>

                        <a href="https://confirmacao-casamento-psi.vercel.app/" class="btn-confirm" target="_blank">Confirmar Agora!</a>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
